# Server
server.port=8080

# Application
app.name=Kiro Java Test
app.version=1.0.0

# Data directory — base path for managed files
app.data.dir=${user.home}/kirojavatest/data
app.data.poll.seconds=5

# Logging
log.level=INFO

# Ollama
ollama.base.url=http://localhost:11434
ollama.model=llava
ollama.timeout.seconds=120

# Face Service
face.service.url=http://localhost:5000
face.service.timeout.seconds=60

# Static file caching (set to false during development to disable browser caching)
static.cache.enabled=false

# Auth — default credentials for prototype (override in production)
auth.username=admin
auth.password=admin
auth.cookie.secret=change-me-in-production
auth.cookie.maxage.days=30
